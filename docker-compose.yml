services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: image_locker
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3308:3306"          # PROD host port (staging uses 3307)
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  # RECOMMENDED: disable phpMyAdmin in production.
  # If you really need it, uncomment and use a different port (8083).
  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   depends_on:
  #     - mysql
  #   environment:
  #     PMA_HOST: mysql
  #     PMA_USER: appuser
  #     PMA_PASSWORD: apppass
  #   ports:
  #     - "8083:80"
  #   restart: unless-stopped

  backend:
    build:
      context: ./image-locker-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/image_locker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      JWT_SECRET: "a9F3kLmP8xQ2vZ7tR1wY6nB4cD9eH5jK3sT8uV2mN6pL0rX4zC7bG1fH9qW5yT2"
      JWT_EXPIRATION_MINUTES: "60"
    ports:
      - "8082:8080"          # PROD host port (staging uses 8080)
    restart: unless-stopped

  frontend:
    build:
      context: ./image-locker-frontend
      args:
        VITE_API_BASE_URL: "http://10.0.0.23:8082"   # PROD backend
    depends_on:
      - backend
    ports:
      - "4174:4173"          # PROD host port (staging uses 4173)
    environment:
      DOCKER: "true"
    restart: unless-stopped

volumes:
  mysql_data: